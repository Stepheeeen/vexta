name: Plisio Invoice Cron Sync

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Plisio safety-net cron sync
        run: |
          curl -i -X GET \
            "https://vexta.network/api/plisio/cron-sync?secret=${{ secrets.CRON_SECRET }}&source=github_action&t=$(date +%s)"

